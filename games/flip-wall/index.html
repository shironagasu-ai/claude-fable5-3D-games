<body>

  壁クリック: その場から次の絵へ　数字キー1-6: 絵を選択　🌀: スピン波　C: シネマカメラ</div>

<input type="file" id="file-input" accept="image/*">

<script type="importmap">

<script type="module">
import * as THREE from 'three';

// ================= 描画セットアップ =================
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.domElement.classList.add('gl');
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060d);
const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 800);

// 背景の星
{
  const pos = new Float32Array(700 * 3);
  for (let i = 0; i < 700; i++) {
    pos[i * 3] = (Math.random() - 0.5) * 500;
    pos[i * 3 + 1] = (Math.random() - 0.5) * 300;
    pos[i * 3 + 2] = -120 - Math.random() * 250;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x8fa8cf, size: 0.9 })));
}

// ================= 画像スロット =================
const isTouch = matchMedia('(pointer: coarse)').matches;
const TARGET_CUBES = isTouch ? 2200 : 4800;
const MAXTEX = 1024;

const slots = new Array(6).fill(null).map(() => ({ tex: null, user: false, thumb: null }));
let wallAspect = 3 / 4;           // w/h。最初のユーザー画像で確定
let aspectLocked = false;
let current = 0;                  // 表示中のスロット番号

// 内蔵プロシージャル画像（未アップロード時のデモ用）
function makeDefaultArt(idx) {
  const w = 768, h = 1024;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d');
  const palettes = [
    ['#0b1c3a', '#2b6cb0', '#8fd8ff'], ['#2a0b3a', '#8b30b0', '#ffb0e8'],
    ['#0b3a2c', '#30b07c', '#c8ffb0'], ['#3a250b', '#b07c30', '#ffe8b0'],
    ['#3a0b14', '#b03050', '#ffb0c0'], ['#0b303a', '#30a0b0', '#b0f4ff'],
  ][idx];
  const grad = g.createLinearGradient(0, 0, w * (idx % 2 ? 1 : 0.2), h);
  grad.addColorStop(0, palettes[0]);
  grad.addColorStop(0.55, palettes[1]);
  grad.addColorStop(1, palettes[2]);
  g.fillStyle = grad;
  g.fillRect(0, 0, w, h);
  // 模様（スロットごとに変化）
  g.globalAlpha = 0.25;
  for (let i = 0; i < 46; i++) {
    g.fillStyle = i % 2 ? palettes[2] : '#ffffff';
    const x = ((i * 137 + idx * 61) % w), y = ((i * 211 + idx * 97) % h);
    if (idx % 3 === 0) { g.beginPath(); g.arc(x, y, 8 + (i % 5) * 14, 0, Math.PI * 2); g.fill(); }
    else if (idx % 3 === 1) { g.fillRect(x, y, 90, 6 + (i % 4) * 5); }
    else { g.save(); g.translate(x, y); g.rotate(i); g.fillRect(-30, -30, 60, 60); g.restore(); }
  }
  g.globalAlpha = 0.85;
  g.fillStyle = 'rgba(255,255,255,0.82)';
  g.font = 'bold 200px monospace';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText(String(idx + 1), w / 2, h / 2);
  g.globalAlpha = 1;
  return c;
}

function coverCrop(source, aspect) {
  const sw = source.width, sh = source.height;
  let cw = sw, ch = sw / aspect;
  if (ch > sh) { ch = sh; cw = sh * aspect; }
  const out = document.createElement('canvas');
  out.width = Math.min(MAXTEX, Math.round(cw));
  out.height = Math.round(out.width / aspect);
  const g = out.getContext('2d');
  g.drawImage(source, (sw - cw) / 2, (sh - ch) / 2, cw, ch, 0, 0, out.width, out.height);
  return out;
}

function setSlotImage(idx, imgSource, isUser) {
  if (isUser && !aspectLocked) {
    wallAspect = imgSource.width / imgSource.height;
    wallAspect = THREE.MathUtils.clamp(wallAspect, 0.45, 2.2);
    aspectLocked = true;
    rebuildWall();
    // 既存スロットを新アスペクトで作り直し
    for (let i = 0; i < 6; i++) {
      if (i !== idx && slots[i].source) applySlotTexture(i, slots[i].source);
    }
  }
  slots[idx].source = imgSource;
  applySlotTexture(idx, imgSource);
  slots[idx].user = isUser;
  updateSlotUI(idx);
}

function applySlotTexture(idx, imgSource) {
  const canvas = coverCrop(imgSource, wallAspect);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 4;
  slots[idx].tex?.dispose();
  slots[idx].tex = tex;
  slots[idx].thumb = canvas.toDataURL('image/jpeg', 0.6);
  if (wallMat) wallMat.uniforms['t' + idx].value = tex;
}

function updateSlotUI(idx) {
  const el = document.querySelector(`.slot[data-slot="${idx}"]`);
  el.style.backgroundImage = `url(${slots[idx].thumb})`;
  el.classList.toggle('user', slots[idx].user);
  el.classList.toggle('active', idx === current);
}
function refreshActiveUI() {
  document.querySelectorAll('.slot').forEach((el, i) => el.classList.toggle('active', i === current));
}

// 表示・巡回対象: ユーザー画像があればユーザー画像のみ、無ければ内蔵6枚
function activeSet() {
  const users = [0, 1, 2, 3, 4, 5].filter(i => slots[i].user);
  return users.length ? users : [0, 1, 2, 3, 4, 5];
}

// ================= 壁（InstancedMesh + カスタムシェーダー） =================
// 面→画像: img0=+z, img1=-z, img2=+x, img3=-x, img4=+y, img5=-y
const FACE_QUATS = [
  new THREE.Quaternion(),                                                       // +z
  new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI), // -z
  new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -Math.PI / 2), // +x
  new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 2),  // -x
  new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 2),  // +y
  new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2), // -y
];

let wallMesh = null, wallMat = null;
let COLS = 0, ROWS = 0, NCUBES = 0;
let cubes = []; // { quat, startQuat, targetQuat, t0, dur, kind, spinAxis, baseQuat }
let matMs = 0;

function buildShaderMaterial() {
  const uniforms = { uGridSize: { value: new THREE.Vector2(1, 1) }, uLightDir: { value: new THREE.Vector3(-0.4, 0.5, 0.75).normalize() } };
  for (let i = 0; i < 6; i++) uniforms['t' + i] = { value: slots[i].tex };
  return new THREE.ShaderMaterial({
    uniforms,
    vertexShader: /* glsl */`
      attribute vec2 aGrid;
      varying vec3 vObjN;
      varying vec3 vWorldN;
      varying vec2 vUv;
      varying vec2 vGrid;
      void main() {
        vObjN = normal;
        vWorldN = normalize(mat3(instanceMatrix) * normal);
        vUv = uv;
        vGrid = aGrid;
        gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      uniform sampler2D t0; uniform sampler2D t1; uniform sampler2D t2;
      uniform sampler2D t3; uniform sampler2D t4; uniform sampler2D t5;
      uniform vec2 uGridSize;
      uniform vec3 uLightDir;
      varying vec3 vObjN;
      varying vec3 vWorldN;
      varying vec2 vUv;
      varying vec2 vGrid;
      void main() {
        vec3 n = vObjN;
        int face;
        vec2 t = vUv;
        // 面判定と、正面へ回転したとき絵が正立するためのUV補正
        if (n.z > 0.5)       { face = 0; }
        else if (n.z < -0.5) { face = 1; t = vec2(1.0 - t.x, t.y); }
        else if (n.x > 0.5)  { face = 2; }
        else if (n.x < -0.5) { face = 3; }
        else if (n.y > 0.5)  { face = 4; t = vec2(t.x, 1.0 - t.y); }
        else                 { face = 5; t = vec2(t.x, 1.0 - t.y); }
        vec2 uvFinal = (vGrid + t) / uGridSize;
        vec4 col;
        if (face == 0) col = texture2D(t0, uvFinal);
        else if (face == 1) col = texture2D(t1, uvFinal);
        else if (face == 2) col = texture2D(t2, uvFinal);
        else if (face == 3) col = texture2D(t3, uvFinal);
        else if (face == 4) col = texture2D(t4, uvFinal);
        else col = texture2D(t5, uvFinal);
        // 簡易ライティング＋タイルの縁を軽く落とす
        float light = 0.72 + 0.38 * max(dot(vWorldN, uLightDir), 0.0);
        float e = min(min(vUv.x, 1.0 - vUv.x), min(vUv.y, 1.0 - vUv.y));
        float edge = 0.78 + 0.22 * smoothstep(0.0, 0.07, e);
        gl_FragColor = vec4(col.rgb * light * edge, 1.0);
      }
    `,
  });
}

function rebuildWall() {
  if (wallMesh) {
    scene.remove(wallMesh);
    wallMesh.geometry.dispose();
    wallMat.dispose();
  }
  COLS = Math.max(8, Math.round(Math.sqrt(TARGET_CUBES * wallAspect)));
  ROWS = Math.max(8, Math.round(COLS / wallAspect));
  NCUBES = COLS * ROWS;

  const geo = new THREE.BoxGeometry(1, 1, 1);
  const grid = new Float32Array(NCUBES * 2);
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const i = r * COLS + c;
    grid[i * 2] = c;
    grid[i * 2 + 1] = ROWS - 1 - r; // r=0 は最上段。テクスチャは v=0 が下端なので反転して割り当てる
  }
  const igeo = new THREE.InstancedBufferGeometry().copy(geo);
  igeo.instanceCount = NCUBES;
  igeo.setAttribute('aGrid', new THREE.InstancedBufferAttribute(grid, 2));

  wallMat = buildShaderMaterial();
  wallMat.uniforms.uGridSize.value.set(COLS, ROWS);
  for (let i = 0; i < 6; i++) wallMat.uniforms['t' + i].value = slots[i].tex;

  wallMesh = new THREE.InstancedMesh(igeo, wallMat, NCUBES);
  wallMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(wallMesh);

  cubes = new Array(NCUBES);
  scatter = new Float32Array(NCUBES * 3);
  const q0 = FACE_QUATS[current].clone();
  for (let i = 0; i < NCUBES; i++) {
    cubes[i] = {
      quat: q0.clone(), startQuat: q0.clone(), targetQuat: q0.clone(),
      t0: -1, dur: 0.5, kind: 'flip', done: true,
    };
  }
  syncAllMatrices(true);
  fitCamera();
}
let scatter = new Float32Array(0);

const _m = new THREE.Matrix4();
const _q = new THREE.Quaternion();
const _p = new THREE.Vector3();
const _s = new THREE.Vector3(0.96, 0.96, 0.96);

function cubeXY(i) {
  const c = i % COLS, r = (i / COLS) | 0;
  return [c - (COLS - 1) / 2, (ROWS - 1) / 2 - r];
}

function composeCube(i, quat, ox, oy, oz) {
  const [x, y] = cubeXY(i);
  _p.set(x + ox, y + oy, oz);
  _m.compose(_p, quat, _s);
  wallMesh.setMatrixAt(i, _m);
}

function syncAllMatrices() {
  for (let i = 0; i < NCUBES; i++) composeCube(i, cubes[i].quat, 0, 0, 0);
  wallMesh.instanceMatrix.needsUpdate = true;
}

// ================= 切り替えアニメーション =================
const WAVE_SPEED = 42;   // cubes/sec
const FLIP_DUR = 0.55;
let animating = 0;
const PATTERNS = ['ripple', 'sweep', 'spiral', 'random', 'assemble'];
let pattern = 'auto';

function easeBack(u) {
  const s = 1.35;
  const v = u - 1;
  return 1 + v * v * ((s + 1) * v + s);
}

// mode: 'spin' | パターン名 | undefined（選択中のパターン。auto はランダム解決）
function triggerWave(target, ox, oy, mode) {
  const pat = mode ?? (pattern === 'auto' ? PATTERNS[(Math.random() * PATTERNS.length) | 0] : pattern);
  const now = clock.elapsedTime;
  const tq = FACE_QUATS[target];
  const maxDim = Math.max(COLS, ROWS);
  // スイープ方向（左右上下・斜めからランダム）
  const sw = [[1, 0], [-1, 0], [0, -1], [0, 1], [0.7071, -0.7071], [-0.7071, 0.7071]][(Math.random() * 6) | 0];
  let minP = Infinity, maxP = -Infinity;
  if (pat === 'sweep') {
    for (const [px, py] of [[-COLS / 2, -ROWS / 2], [COLS / 2, -ROWS / 2], [-COLS / 2, ROWS / 2], [COLS / 2, ROWS / 2]]) {
      const p = px * sw[0] + py * sw[1];
      minP = Math.min(minP, p); maxP = Math.max(maxP, p);
    }
  }
  for (let i = 0; i < NCUBES; i++) {
    const [x, y] = cubeXY(i);
    const cb = cubes[i];
    let delay = 0, dur = FLIP_DUR, kind = pat === 'spin' ? 'spin' : 'flip';
    if (pat === 'ripple' || pat === 'spin') {
      delay = Math.hypot(x - ox, y - oy) / WAVE_SPEED;
    } else if (pat === 'sweep') {
      delay = ((x * sw[0] + y * sw[1]) - minP) / (maxP - minP) * 1.35;
    } else if (pat === 'spiral') {
      const a = (Math.atan2(y - oy * 0.3, x - ox * 0.3) + Math.PI) / (Math.PI * 2);
      delay = a * 0.85 + Math.hypot(x, y) / (maxDim * 0.7) * 1.0;
    } else if (pat === 'random') {
      delay = Math.random() * 1.2;
    } else if (pat === 'assemble') {
      delay = Math.random() * 0.35 + Math.hypot(x - ox, y - oy) / maxDim * 0.3;
      dur = 1.35;
      kind = 'assemble';
      // 飛散ベクトル: 手前（カメラ側）に強めのバイアス
      const th = Math.random() * Math.PI * 2;
      const r = maxDim * (0.15 + Math.random() * 0.4);
      scatter[i * 3] = Math.cos(th) * r;
      scatter[i * 3 + 1] = Math.sin(th) * r * 0.7;
      scatter[i * 3 + 2] = 4 + Math.random() * maxDim * 0.45;
    }
    // 進行中のアニメは現在姿勢から継続
    cb.startQuat.copy(cb.quat);
    cb.targetQuat.copy(tq);
    cb.t0 = now + delay;
    cb.dur = dur;
    cb.kind = kind;
    cb.done = false;
  }
  if (pat !== 'spin') { current = target; refreshActiveUI(); }
  autoT = 0; // 手動トリガー直後の自動切替を防ぐ
  sfx('ripple');
}

function stepCubes() {
  const now = clock.elapsedTime;
  const t0 = performance.now();
  let any = false;
  let count = 0;
  for (let i = 0; i < NCUBES; i++) {
    const cb = cubes[i];
    if (cb.done || cb.t0 < 0) continue;
    const u = (now - cb.t0) / cb.dur;
    if (u < 0) { any = true; continue; }
    count++;
    if (u >= 1) {
      if (cb.kind === 'spin') cb.quat.copy(cb.startQuat);
      else cb.quat.copy(cb.targetQuat);
      composeCube(i, cb.quat, 0, 0, 0);
      cb.done = true;
      any = true;
      continue;
    }
    if (cb.kind === 'spin') {
      _q.setFromAxisAngle(AXIS_Y, Math.PI * 2 * smooth(u)); // u=1 でちょうど一回転して元の姿勢へ
      cb.quat.copy(cb.startQuat).multiply(_q);
      composeCube(i, cb.quat, 0, 0, Math.sin(Math.PI * u) * 1.1);
    } else if (cb.kind === 'assemble') {
      const e = smooth(u);
      cb.quat.copy(cb.startQuat).slerp(cb.targetQuat, e);
      const s = Math.sin(Math.PI * e); // 飛散して戻る
      composeCube(i, cb.quat, scatter[i * 3] * s, scatter[i * 3 + 1] * s, scatter[i * 3 + 2] * s);
    } else {
      const e = easeBack(u);
      cb.quat.copy(cb.startQuat).slerp(cb.targetQuat, Math.min(1, Math.max(0, e)));
      composeCube(i, cb.quat, 0, 0, Math.sin(Math.PI * u) * 1.1);
    }
    any = true;
  }
  animating = count;
  if (any) wallMesh.instanceMatrix.needsUpdate = true;
  matMs = matMs * 0.9 + (performance.now() - t0) * 0.1;
}
const AXIS_Y = new THREE.Vector3(0, 1, 0);
function smooth(u) { return u * u * (3 - 2 * u); }

// ================= カメラ =================
function fitCamera() {
  const vfov = THREE.MathUtils.degToRad(camera.fov);
  const hfov = 2 * Math.atan(Math.tan(vfov / 2) * camera.aspect);
  const dz = Math.max(
    (ROWS / 2 + 1) / Math.tan(vfov / 2),
    (COLS / 2 + 1) / Math.tan(hfov / 2)
  ) * 1.06;
  camera.position.set(0, 0, dz);
  camera.lookAt(0, 0, 0);
}
let parallax = { x: 0, y: 0 };
addEventListener('pointermove', e => {
  parallax.x = (e.clientX / innerWidth - 0.5) * 2;
  parallax.y = (e.clientY / innerHeight - 0.5) * 2;
});

// ================= シネマカメラ =================
const BASE_FOV = 46;
let camMode = 'front';
let shot = null, shotT = 0, lastShotIdx = -1, autoT = 0;

const lerp = (a, b, t) => a + (b - a) * t;
function easeIO(u) { return u < 0.5 ? 2 * u * u : 1 - Math.pow(-2 * u + 2, 2) / 2; }
function frontDist() {
  const vfov = THREE.MathUtils.degToRad(BASE_FOV);
  const hfov = 2 * Math.atan(Math.tan(vfov / 2) * camera.aspect);
  return Math.max((ROWS / 2 + 1) / Math.tan(vfov / 2), (COLS / 2 + 1) / Math.tan(hfov / 2)) * 1.06;
}

// ベンチマークデモ風のカット割り。位置・注視点は u∈[0,1] の関数
function makeShots() {
  const W = COLS, H = ROWS, D = frontDist();
  return [
    { // 低空ドリー（壁面すれすれを横移動）
      dur: 7, fov: 40,
      pos: u => [lerp(-W * 0.35, W * 0.35, u), -H * 0.28, 5.5],
      look: u => [lerp(-W * 0.1, W * 0.55, u), -H * 0.05, 0],
    },
    { // コーナーオービット
      dur: 8, fov: 50,
      pos: u => { const a = lerp(-0.85, -0.2, u); return [Math.sin(a) * W * 0.8, lerp(-H * 0.15, H * 0.28, u), Math.cos(a) * W * 0.8]; },
      look: () => [0, 0, 0],
    },
    { // クレーンダウン（上空から降りる）
      dur: 7, fov: 45,
      pos: u => [W * 0.12, lerp(H * 0.6, -H * 0.05, u), lerp(9, 14, u)],
      look: u => [0, lerp(H * 0.15, 0, u), 0],
    },
    { // エッジ滑走（ほぼ真横からキューブの厚みを見る）
      dur: 7, fov: 38,
      pos: u => [W * 0.55, lerp(H * 0.3, -H * 0.3, u), 3.2],
      look: u => [W * 0.1, lerp(H * 0.12, -H * 0.12, u), 0.8],
    },
    { // 引きの微オービット
      dur: 8, fov: BASE_FOV,
      pos: u => { const a = lerp(0.22, -0.22, u); return [Math.sin(a) * D, H * 0.06, Math.cos(a) * D]; },
      look: () => [0, 0, 0],
    },
    { // 接写プッシュイン
      dur: 6, fov: 35,
      pos: u => [lerp(-W * 0.12, W * 0.04, u), lerp(-H * 0.12, H * 0.04, u), lerp(8, 3.4, u)],
      look: u => [lerp(-W * 0.12, W * 0.04, u) + 1.5, lerp(-H * 0.12, H * 0.04, u) + 1, 0],
    },
  ];
}

function nextShot() {
  const shots = makeShots();
  let idx;
  do { idx = (Math.random() * shots.length) | 0; } while (idx === lastShotIdx && shots.length > 1);
  lastShotIdx = idx;
  shot = shots[idx];
  shotT = 0;
}

function toggleCamera() {
  camMode = camMode === 'front' ? 'cinema' : 'front';
  document.getElementById('cam-btn').classList.toggle('on', camMode === 'cinema');
  if (camMode === 'cinema') { nextShot(); autoT = 0; }
  else {
    camera.fov = BASE_FOV;
    camera.updateProjectionMatrix();
    fitCamera();
  }
}
addEventListener('keydown', e => { if (e.code === 'KeyC') toggleCamera(); });

// ================= 入力 =================
const raycaster = new THREE.Raycaster();
const wallPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -0.5);
function wallClickAt(clientX, clientY) {
  const ndc = new THREE.Vector2((clientX / innerWidth) * 2 - 1, -(clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  const hit = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(wallPlane, hit)) return;
  const ox = THREE.MathUtils.clamp(hit.x, -COLS / 2, COLS / 2);
  const oy = THREE.MathUtils.clamp(hit.y, -ROWS / 2, ROWS / 2);
  const set = activeSet();
  if (set.length === 1) {
    triggerWave(current, ox, oy, 'spin');
  } else {
    const next = set[(set.indexOf(current) + 1) % set.length];
    triggerWave(next, ox, oy);
  }
}
renderer.domElement.addEventListener('pointerdown', e => wallClickAt(e.clientX, e.clientY));

addEventListener('keydown', e => {
  const n = Number(e.key);
  if (n >= 1 && n <= 6) trySwitchTo(n - 1);
});
function trySwitchTo(idx) {
  if (!slots[idx].tex) return;
  if (slots[idx].user || activeSet().length === 6) {
    if (idx === current) triggerWave(idx, 0, 0, 'spin');
    else triggerWave(idx, 0, 0);
  }
}

// スロットUI
let pickTarget = 0;
const fileInput = document.getElementById('file-input');
document.querySelectorAll('.slot').forEach(el => {
  const idx = Number(el.dataset.slot);
  el.addEventListener('click', () => {
    if (slots[idx].user) trySwitchTo(idx);
    else { pickTarget = idx; fileInput.click(); }
  });
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    el.classList.remove('dragover');
    document.getElementById('drop-hint').classList.remove('show');
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f, idx);
  });
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0], pickTarget);
  fileInput.value = '';
});
document.getElementById('spin-btn').addEventListener('click', () => triggerWave(current, 0, 0, 'spin'));

// パターン選択とカメラ切替
document.querySelectorAll('#patterns button[data-p]').forEach(el => {
  el.addEventListener('click', () => {
    pattern = el.dataset.p;
    document.querySelectorAll('#patterns button[data-p]').forEach(b => b.classList.toggle('on', b === el));
  });
});
document.getElementById('cam-btn').addEventListener('click', toggleCamera);

// ページ全体へのドロップ: 空きスロット（無ければ次のスロット）へ
addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('drop-hint').classList.add('show');
});
addEventListener('dragleave', e => {
  if (e.relatedTarget === null) document.getElementById('drop-hint').classList.remove('show');
});
addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-hint').classList.remove('show');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/')).slice(0, 6);
  let cursor = 0;
  for (const f of files) {
    let idx = slots.findIndex((s, i) => i >= cursor && !s.user);
    if (idx < 0) idx = cursor % 6;
    cursor = idx + 1;
    loadFile(f, idx);
  }
});

function loadFile(file, idx) {
  if (!file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    setSlotImage(idx, img, true);
    trySwitchTo(idx);
    sfx('load');
  };
  img.src = url;
}

// ================= サウンド =================
let audioCtx = null;
function sfx(kind) {
  try {
    audioCtx ??= new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    if (kind === 'ripple') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(320, t);
      o.frequency.exponentialRampToValueAtTime(720, t + 0.5);
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.65);
    } else if (kind === 'load') {
      for (const [f, d] of [[660, 0], [880, 0.08]]) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = f;
        g.gain.setValueAtTime(0.09, t + d);
        g.gain.exponentialRampToValueAtTime(0.001, t + d + 0.12);
        o.connect(g).connect(audioCtx.destination);
        o.start(t + d); o.stop(t + d + 0.15);
      }
    }
  } catch (_) { /* 音は演出のみ */ }
}

// ================= 初期化・ループ =================
for (let i = 0; i < 6; i++) setSlotImage(i, makeDefaultArt(i), false);
rebuildWall();
refreshActiveUI();

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  stepCubes();

  if (camMode === 'cinema') {
    shotT += dt;
    if (!shot || shotT > shot.dur) nextShot();
    const u = easeIO(Math.min(1, shotT / shot.dur));
    const p = shot.pos(u), l = shot.look(u);
    camera.position.set(p[0], p[1], p[2]);
    camera.lookAt(l[0], l[1], l[2]);
    if (camera.fov !== shot.fov) { camera.fov = shot.fov; camera.updateProjectionMatrix(); }
    // アトラクトモード: 一定間隔で自動的に次の絵へ
    autoT += dt;
    if (autoT > 9) {
      autoT = 0;
      const set = activeSet();
      if (set.length === 1) triggerWave(current, 0, 0, 'spin');
      else triggerWave(set[(set.indexOf(current) + 1) % set.length], 0, 0);
    }
  } else {
    // マウスパララックス
    const bx = parallax.x * COLS * 0.04, by = -parallax.y * ROWS * 0.03;
    camera.position.x += (bx - camera.position.x) * 0.06;
    camera.position.y += (by - camera.position.y) * 0.06;
    camera.lookAt(0, 0, 0);
  }

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  fitCamera();
});

// ================= テスト用フック =================
window.__wall = {
  grid: () => ({ cols: COLS, rows: ROWS, n: NCUBES }),
  current: () => current,
  animating: () => animating,
  matMs: () => matMs,
  aspect: () => wallAspect,
  activeSet,
  switchTo: trySwitchTo,
  clickCenter() { wallClickAt(innerWidth / 2, innerHeight / 2); },
  loadDataURL(idx, dataURL, cb) {
    const img = new Image();
    img.onload = () => { setSlotImage(idx, img, true); cb?.(); };
    img.src = dataURL;
    return true;
  },
  spin() { triggerWave(current, 0, 0, 'spin'); },
  setPattern(p) { pattern = p; },
  getPattern: () => pattern,
  trigger(target, p) { triggerWave(target, 0, 0, p); },
  camMode: () => camMode,
  toggleCamera,
  camPos: () => camera.position.toArray(),
  shotDur: () => (shot ? shot.dur : 0),
  forceNextShot: nextShot,
};
</script>
</body>
</html>
